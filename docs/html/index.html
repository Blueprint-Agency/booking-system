<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking System — Documents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #111114;
      --border: #222228;
      --text: #e8e3d8;
      --muted: #5a5a65;
      --accent: #c9a464;
      --accent-dim: rgba(201, 164, 100, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── Header ── */
    header {
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 6vw, 68px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .meta {
      margin-top: 18px;
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── Doc list ── */
    .doc-list {
      flex: 1;
      padding: 48px 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .doc-item {
      display: flex;
      align-items: stretch;
      gap: 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: background 0.3s ease;
    }

    .doc-item:last-child { border-bottom: 1px solid var(--border); }

    .doc-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .doc-item:hover {
      background: var(--accent-dim);
    }

    .doc-item:hover::before {
      transform: scaleY(1);
    }

    .doc-num {
      font-size: 10px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      width: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 28px 0 28px 20px;
      transition: color 0.3s ease;
    }

    .doc-item:hover .doc-num { color: var(--accent); }

    .doc-body {
      flex: 1;
      padding: 28px 24px 28px 0;
    }

    .doc-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 6px;
      transition: color 0.3s ease;
    }

    .doc-item:hover .doc-title { color: var(--accent); }

    .doc-filename {
      font-size: 10px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .doc-arrow {
      display: flex;
      align-items: center;
      padding: 28px 20px 28px 0;
      color: var(--muted);
      font-size: 16px;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .doc-item:hover .doc-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      padding: 32px 0 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .doc-item:nth-child(1) { animation-delay: 0.40s; }
    .doc-item:nth-child(2) { animation-delay: 0.50s; }
    .doc-item:nth-child(3) { animation-delay: 0.60s; }
    .doc-item:nth-child(4) { animation-delay: 0.70s; }
    .doc-item:nth-child(5) { animation-delay: 0.75s; }
  </style>
</head>
<body>
  <div class="wrap">

    <header>
      <p class="eyebrow">Blueprint Agency &nbsp;/&nbsp; Booking System</p>
      <h1>Document<br /><em>Archive</em></h1>
      <p class="meta">Internal reference documents &nbsp;·&nbsp; All phases</p>
    </header>

    <main class="doc-list">
      <p class="section-label">Documents &nbsp;— &nbsp;<span id="doc-count"></span></p>

      <a class="doc-item" href="prd-phase1.html">
        <span class="doc-num">01</span>
        <div class="doc-body">
          <div class="doc-title">Product Requirements — Phase 1</div>
          <div class="doc-filename">prd-phase1.html</div>
        </div>
        <span class="doc-arrow">→</span>
      </a>

    </main>

    <footer>
      <span>Booking System</span>
      <span id="footer-date"></span>
    </footer>

  </div>
  <script>
    document.getElementById('footer-date').textContent = new Date().getFullYear();
    const items = document.querySelectorAll('.doc-item');
    document.getElementById('doc-count').textContent = items.length + ' file' + (items.length !== 1 ? 's' : '');
  </script>
</body>
</html>
