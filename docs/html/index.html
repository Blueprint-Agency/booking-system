<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System — Document Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #faf9f6;
      --warm: #f5f0e8;
      --accent: #c4956a;
      --accent-deep: #a67548;
      --accent-glow: #e8c9a8;
      --sage: #7a8f72;
      --sage-light: #e8ede6;
      --muted: #8b8b8b;
      --border: #e2ddd5;
      --card: #ffffff;
      --shadow-soft: 0 2px 20px rgba(26, 26, 46, 0.06);
      --shadow-hover: 0 8px 40px rgba(26, 26, 46, 0.1);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.7;
      font-weight: 400;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION ── */
    .section {
      padding: 80px 24px 100px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--ink);
    }

    .section-count {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── DOC CARDS ── */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .doc-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: var(--shadow-soft);
      transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
      animation: fadeUp 0.6s ease-out both;
    }

    .doc-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .doc-card:nth-child(1) { animation-delay: 0.1s; }
    .doc-card:nth-child(2) { animation-delay: 0.2s; }
    .doc-card:nth-child(3) { animation-delay: 0.3s; }
    .doc-card:nth-child(4) { animation-delay: 0.4s; }
    .doc-card:nth-child(5) { animation-delay: 0.5s; }

    .doc-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .doc-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: var(--warm);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    .doc-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .doc-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
    }

    .doc-desc {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      line-height: 1.6;
      flex: 1;
    }

    .doc-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .doc-filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .doc-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--warm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--accent-deep);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .doc-card:hover .doc-arrow {
      background: var(--accent);
      color: #fff;
      transform: translateX(3px);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    footer strong { color: var(--ink); font-weight: 600; }
  </style>
</head>
<body>

  <!-- DOC LIST -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">All Documents</h2>
        <span class="section-count" id="section-count"></span>
      </div>

      <div class="doc-grid">

        <a class="doc-card" href="prd-phase1.html">
          <div class="doc-card-top">
            <span class="doc-tag">PRD</span>
            <span class="doc-num">01</span>
          </div>
          <div class="doc-title">Product Requirements — Phase 1</div>
          <div class="doc-desc">Core booking flow, user roles, feature scope, and technical requirements for the initial release.</div>
          <div class="doc-footer">
            <span class="doc-filename">prd-phase1.html</span>
            <span class="doc-arrow">→</span>
          </div>
        </a>

      </div>
    </div>
  </section>

  <footer>
    <strong>Booking System</strong> &nbsp;·&nbsp; Blueprint Agency &nbsp;·&nbsp; <span id="year"></span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const cards = document.querySelectorAll('.doc-card');
    const count = cards.length + ' file' + (cards.length !== 1 ? 's' : '');
    document.getElementById('section-count').textContent = count;
  </script>

</body>
</html>
